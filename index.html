<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <meta name="theme-color" content="#07090D" />
    <!-- Standard PWA capability hint (modern browsers) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- iOS-specific capability hints (kept for iOS Safari which doesn't yet read the standard tag) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <meta property="og:title" content="SpendTrack — Local-first spending tracker" />
    <meta property="og:description" content="A fast, offline-first spending tracker with smart categorisation, real-time budgets, and optional cross-device sync." />
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://spending-tracker-omega.vercel.app/" />

    <meta name="twitter:description" content="Offline-first spending tracker with smart entry, real-time budgets, and optional cross-device sync." />

    <title>SpendTrack — Local-first spending tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

    <div id="root"></div>
    <link rel="manifest" href="/manifest.webmanifest" />
    <script type="module" src="/src/main.tsx"></script>
