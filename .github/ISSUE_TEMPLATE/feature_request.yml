name: Feature request
description: Suggest an improvement for SpendTrack
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What daily workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should SpendTrack do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Quick entry
        - Pulse dashboard
        - Ledger
        - Insights
        - Settings/import/export
        - Repository/documentation
