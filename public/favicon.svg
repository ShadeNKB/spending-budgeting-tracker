<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0E1217"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="ring" x1="6" y1="6" x2="26" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="7.5" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Pace ring track (dim) -->
  <circle cx="16" cy="16" r="8" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2.5"/>
  <!-- Pace ring active arc — 46% of circumference, the app's signature data-viz silhouette -->
  <circle
    cx="16" cy="16" r="8"
    fill="none"
    stroke="url(#ring)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-dasharray="50.27"
    stroke-dashoffset="27.15"
    transform="rotate(-90 16 16)"
  />
  <!-- Center dot accent -->
  <circle cx="16" cy="16" r="2" fill="url(#ring)"/>
</svg>
